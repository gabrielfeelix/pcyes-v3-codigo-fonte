
  <!DOCTYPE html>
  <html lang="pt-BR" class="dark">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <style>
      /* Critical: pinta o fundo base antes do bundle CSS (que é carregado non-blocking) — evita flash */
      html { background: #121212; }
      html.light { background: #fafafa; }
      body { margin: 0; background: #121212; }
      html.light body { background: #fafafa; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" /></noscript>
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preload" as="image" href="/assets/banner-1.webp" fetchpriority="high" />
      <!-- Tags SEO com data-rh: react-helmet-async reconcilia (substitui) por rota
           em runtime sem duplicar. O plugin Vite prerenderSeoHtml (vite.config.ts)
           reescreve canonical/og:url por rota no HTML estático (self-referring no cru). -->
      <title>PCYES — Hardware, Periféricos & Setup Gamer</title>
      <meta name="description" content="PCYES — Hardware, periféricos, computadores e edições exclusivas. Frete grátis acima de R$ 299, parcelamento sem juros e 10% no PIX." data-rh="true" />
      <meta name="robots" content="index, follow" data-rh="true" />
      <link rel="canonical" href="https://www.pcyes.com.br/" data-rh="true" />
      <meta property="og:type" content="website" data-rh="true" />
      <meta property="og:locale" content="pt_BR" data-rh="true" />
      <meta property="og:site_name" content="PCYES" data-rh="true" />
      <meta property="og:title" content="PCYES — Hardware, Periféricos & Setup Gamer" data-rh="true" />
      <meta property="og:description" content="Hardware, periféricos e setups gamer com identidade PCYES." data-rh="true" />
      <meta property="og:url" content="https://www.pcyes.com.br/" data-rh="true" />
      <meta name="twitter:card" content="summary_large_image" data-rh="true" />
      <script>
        try {
          if (localStorage.getItem('pcyes-theme') === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
